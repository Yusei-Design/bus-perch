<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bus Perch | 待つ場所のズレ</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <!-- フィルターバー -->
  <div id="categoryFilter" class="filter-bar"></div>

  <!-- カウントバー -->
  <div id="countBar" class="count-bar"></div>

  <!-- FABコントロール -->
  <div class="fab-container">
    <button type="button" class="fab-btn is-active" id="btnStops" title="バス停表示">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="1"/></svg>
    </button>
    <button type="button" class="fab-btn is-active" id="btnLines" title="ズレ線表示">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20 20 4"/></svg>
    </button>
    <button type="button" class="fab-btn" id="btnHeat" title="ヒートマップ">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 12c2-2.96 0-7-1-8 0 3.038-1.773 4.741-3 6-1.226 1.26-2 3.24-2 5a6 6 0 1 0 12 0c0-1.532-1.056-3.94-2-5-1.786 3-2.791 3-4 2z"/></svg>
    </button>
  </div>

  <!-- 詳細パネル -->
  <div id="infoPanel" class="info-panel">
    <button class="panel-close" id="panelCloseBtn">×</button>
    <div id="panelContent" class="panel-scroll"></div>
  </div>

  <!-- ライトボックス -->
  <div id="lightbox" class="lightbox-overlay">
    <button class="lightbox-close" id="lightboxCloseBtn">×</button>
    <img id="lightboxImg" class="lightbox-img" src="" alt="" />
  </div>

  <script src="main.js"></script>
</body>
</html>
